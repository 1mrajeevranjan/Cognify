<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cognify</title>
  <!-- iOS / Capacitor specific -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Cognify">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor: 'unsafe-inline' 'unsafe-eval'; script-src 'self' capacitor: 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co capacitor:; img-src 'self' data: blob: https:">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/ios.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash" class="splash-overlay">
    <div class="splash-logo">Cognify</div>
    <div class="splash-spinner"></div>
  </div>

  <div class="app-container">
    <!-- Mobile Header -->
    <header class="mobile-header">
      <div class="mobile-brand">Cognify</div>
      <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Open menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </header>

    <!-- Sidebar overlay for mobile -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar-container">
      <div class="sidebar-brand">Cognify</div>
      <nav id="sidebar-nav"></nav>
    </div>

    <!-- Main View -->
    <main class="main-content">
      <div id="view-container"></div>
    </main>
  </div>

  <!-- Capacitor bridge (injected by native layer) -->
  <script src="capacitor.js"></script>
  <!-- Global Entry Script -->
  <script src="lib/supabase.js"></script>
  <script type="module" src="src/app.js"></script>
</body>
</html>
