<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cognify</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data: blob: https:">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash" class="splash-overlay">
    <div class="splash-brand">
      <img src="logo.png" alt="Cognify logo" class="brand-logo splash-brand-logo">
      <div class="splash-copy">
        <div class="splash-logo">Cognify</div>
        <div class="splash-tagline">Clear work. Calm focus.</div>
      </div>
    </div>
    <div class="splash-spinner"></div>
  </div>

  <div class="app-container">
    <header id="mac-toolbar" class="mac-toolbar" aria-label="Toolbar">
      <button id="mac-sidebar-toggle" class="mac-toolbar-button" type="button" aria-label="Toggle sidebar"></button>
      <div id="mac-toolbar-title" class="mac-toolbar-title">Today</div>
      <button id="mac-quick-add" class="mac-toolbar-button mac-toolbar-primary" type="button" aria-label="Create task"></button>
    </header>

    <!-- Mobile Header -->
    <header class="mobile-header">
      <div class="mobile-brand">
        <img src="logo.png" alt="" class="brand-logo mobile-brand-logo">
        <span class="mobile-brand-label">Cognify</span>
      </div>
      <div class="mobile-header-actions">
        <button id="mobile-quick-add" class="mobile-quick-add" aria-label="Create task">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 5v14"></path>
            <path d="M5 12h14"></path>
          </svg>
        </button>
        <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Open menu"></button>
      </div>
    </header>

    <!-- Sidebar overlay for mobile -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar-container">
      <div class="sidebar-brand">
        <img src="logo.png" alt="" class="brand-logo sidebar-brand-logo">
        <div class="sidebar-brand-copy">
          <div class="sidebar-brand-title">Cognify</div>
          <div class="sidebar-brand-subtitle">Calm task planning</div>
        </div>
      </div>
      <nav id="sidebar-nav"></nav>
      <button id="sidebar-quick-add" class="sidebar-quick-add" type="button">New Task</button>
    </div>

    <!-- Main View -->
    <main class="main-content">
      <div id="view-container"></div>
    </main>
  </div>

  <nav id="mobile-tabbar" class="mobile-tabbar" aria-label="Primary"></nav>

  <!-- Global Entry Script -->
  <script src="lib/supabase.js"></script>
  <script type="module" src="src/app.js"></script>
</body>
</html>
